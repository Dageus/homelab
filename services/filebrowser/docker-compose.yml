services:
  filebrowser:
    container_name: filebrowser
    image: filebrowser/filebrowser:latest
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - /data/drive1:/srv/drive1:ro
      - /data/drive2:/srv/drive2:ro

      - fb_database:/database
    environment:
      - FB_DATABASE=/database/filebrowser.db

volumes:
  fb_database:
