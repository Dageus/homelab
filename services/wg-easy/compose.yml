services:
  wg-easy:
    environment:
      - LANG=en
      - WG_HOST=<your_hostname>
      - PASSWORD_HASH=<your_hash> # check the README to see how to generate your hash
      - PORT=57821 # can be changed to your liking
      - WG_PORT=57820 # web GUI port
      - WG_DEFAULT_ADDRESS=10.10.10.x
      - WG_DEFAULT_DNS=1.1.1.1
      # - WG_MTU=1420
      - WG_ALLOWED_IPD=0.0.0.0/0
      - WG_PERSISTENT_KEEPALIVE=25
      # - WG_PRE_UP=echo "Pre Up" > /etc/wireguard/pre-up.txt
      # - WG_POST_UP=echo "Post Up" > /etc/wireguard/post-up.txt
      # - WG_PRE_DOWN=echo "Pre Down" > /etc/wireguard/pre-down.txt
      # - WG_POST_DOWN=echo "Post Down" > /etc/wireguard/post-down.txt
      - UI_TRAFFIC_STATS=true
      - UI_CHART_TYPE=1
    image: ghcr.io/wg-easy/wg-easy
    container_name: wg-easy
    volumes:
      - /root/wireguard/data:/etc/wireguard/
    ports:
      - "57820:57820/udp"
      - "57821:57821/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
