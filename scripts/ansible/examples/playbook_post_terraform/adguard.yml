---
- name: Deploy AdGuard Home container
  hosts: adguard
  become: yes # become sudo

  tasks:
    - name: Create adguard directory
      file:
        path: "{{ adguard_dir }}"
        state: directory
        mode: '0755'

    - name: Copy Docker Compose file
      copy:
        src: docker-compose.yaml
        dest: "{{ adguard_dir }}/docker-compose.yaml"
        mode: '0644'

    - name: Start Adguard containers
      docker_compose:
        project_src: "{{ adguard_dir }}"
        state: present
